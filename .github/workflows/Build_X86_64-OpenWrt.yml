        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          **This is OpenWrt Firmware for ${{ env.FILE_NAME }}**
          ### 📒 固件信息
          - 💻 平台架构: ${{ env.FILE_NAME }}
          - ⚽ 固件源码: ${{ env.REPO_URL }}
          - 💝 源码分支: ${{ env.REPO_BRANCH }}
          - 🚀 内核版本: ${{ env.KERNEL }}
          - 🌐 默认地址：192.168.8.3
          - 🔑 默认密码：无密码
          ### 🧊 固件版本
